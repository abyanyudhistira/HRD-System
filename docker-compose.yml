version: '3.8'

services:
  # API Service
  api:
    build: .
    command: sh -c "cd api && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - api/.env
    environment:
      - SERVICE_TYPE=api
      - PYTHONPATH=/app
    volumes:
      - ./api:/app/api
      - ./crawler:/app/crawler  # Shared modules
      - ./scoring:/app/scoring  # Shared modules
    depends_on:
      - rabbitmq
    restart: unless-stopped

  # Crawler Service
  crawler:
    build: .
    command: sh -c "cd crawler && python crawler_consumer.py"
    env_file:
      - crawler/.env
    environment:
      - SERVICE_TYPE=crawler
      - HEADLESS_MODE=true
      - PYTHONPATH=/app
    volumes:
      - ./crawler/data:/app/crawler/data
      - ./crawler:/app/crawler
      - ./api:/app/api  # Shared modules
    depends_on:
      - rabbitmq
    restart: unless-stopped

  # Scoring Service
  scoring:
    build: .
    command: sh -c "cd scoring && python scoring_consumer.py"
    env_file:
      - scoring/.env
    environment:
      - SERVICE_TYPE=scoring
      - PYTHONPATH=/app
    volumes:
      - ./scoring/data:/app/scoring/data
      - ./scoring:/app/scoring
      - ./api:/app/api  # Shared modules
    depends_on:
      - rabbitmq
    restart: unless-stopped

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=password123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  # Optional: PostgreSQL Database (jika tidak pakai Supabase)
  # postgres:
  #   image: postgres:13
  #   environment:
  #     - POSTGRES_DB=linkedin_crawler
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=password123
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

volumes:
  rabbitmq_data:
  # postgres_data: